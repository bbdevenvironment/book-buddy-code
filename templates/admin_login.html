<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BOOK BUDDY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Base Styles & Color Palette */
        :root {
            --brand-navy: #0A2472;
            --brand-crimson: #740f28;
            --brand-white: #ffffff;
            --bg-light: #f4f7f6;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Optional: Add a subtle patterned or gradient background for the admin side */
            background-image: linear-gradient(135deg, #f4f7f6 0%, #e2e8f0 100%);
        }

        /* Login Card Styling */
        .admin-login-card {
            background-color: var(--brand-white);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(10, 36, 114, 0.1); /* Slight navy tint to the shadow */
            border-top: 6px solid var(--brand-navy);
            position: relative;
        }

        /* Security Badge/Icon Placeholder */
        .admin-badge {
            position: absolute;
            top: -15px;
            right: 30px;
            background-color: var(--brand-crimson);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(116, 15, 40, 0.3);
        }

        /* Brand Header */
        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-header img {
            height: 45px;
            margin-bottom: 15px;
            object-fit: contain;
        }

        .brand-header h3 {
            color: var(--brand-navy);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
            font-weight: 500;
        }

        /* Form Inputs */
        .input-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--brand-navy);
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 0.95rem;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        .form-control:focus {
            border-color: var(--brand-navy);
            background-color: var(--brand-white);
            box-shadow: 0 0 0 3px rgba(10, 36, 114, 0.1);
            outline: none;
        }

        /* Custom Admin Button */
        .btn-custom-navy {
            background-color: var(--brand-navy);
            color: var(--brand-white);
            border: none;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        .btn-custom-navy:hover {
            background-color: #071952; /* Darker navy for hover */
            color: var(--brand-white);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(10, 36, 114, 0.2);
        }

        /* Links */
        .login-links {
            margin-top: 25px;
            text-align: center;
        }

        .login-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .login-links a:hover {
            color: var(--brand-crimson);
        }
    </style>
</head>

<body>

    <div class="admin-login-card">
        <div class="admin-badge">SECURE AREA</div>

        <div class="brand-header">
            <a href="/">
                <img src="https://www.book-buddy.in/static/img/logo/logo_1.png" alt="Book Buddy Logo" onerror="this.style.display='none'">
            </a>
            <h3>Admin Login</h3>
            <p>Access the BOOK BUDDY dashboard</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="input-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter admin username" required autofocus>
            </div>
            
            <div class="mb-3">
                <label class="input-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-custom-navy w-100">Login to Dashboard</button>
            
            <div class="login-links">
                <a href="/">← Return to Homepage</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
