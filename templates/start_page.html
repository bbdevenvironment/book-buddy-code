<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Coding Contest - BOOK BUDDY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Base Styles & Color Palette */
        :root {
            --brand-navy: #0A2472;
            --brand-crimson: #740f28;
            --brand-white: #ffffff;
            --bg-light: #f4f7f6;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Styling */
        .navbar {
            background-color: var(--brand-white);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            padding: 12px 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--brand-navy) !important;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .navbar-brand img {
            height: 45px; /* Optimized height for your logo */
            width: auto;
            object-fit: contain;
        }

        /* Hero Section Styling */
        .hero-section {
            background-color: var(--brand-navy);
            /* Subtle gradient for a premium feel */
            background-image: linear-gradient(135deg, #0A2472 0%, #0d2e8c 100%);
            color: var(--brand-white);
            padding: 120px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            margin-bottom: 24px;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Custom Buttons */
        .btn-custom-crimson {
            background-color: var(--brand-crimson);
            color: var(--brand-white);
            border: 2px solid var(--brand-crimson);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-custom-crimson:hover {
            background-color: transparent;
            color: var(--brand-crimson);
            background-color: var(--brand-white);
            border-color: var(--brand-white);
        }

        .btn-custom-outline {
            background-color: transparent;
            color: var(--brand-white);
            border: 2px solid rgba(255, 255, 255, 0.5);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-custom-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--brand-white);
            color: var(--brand-white);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero-section {
                padding: 80px 20px 100px;
            }
            .btn {
                width: 100%;
                margin-bottom: 15px;
            }
            /* Remove margin from the last button on mobile */
            .btn:last-child {
                margin-bottom: 0;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-center justify-content-md-start">
            <a class="navbar-brand" href="/">
                <img src="https://www.book-buddy.in/static/img/logo/logo_1.png" alt="Book Buddy Logo" onerror="this.style.display='none'">
              
            </a>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-content container">
            <h1 class="hero-title">Practice Coding Contest <br> <span style="color: #ffb3c6;">In our college</span></h1>
            <p class="hero-subtitle">Test your skills, write efficient code, and compete with the best.</p>
            
            <div class="mt-4 d-flex flex-column flex-sm-row justify-content-center gap-3">
                <a href="/student_login" class="btn btn-custom-crimson btn-lg px-5 rounded-pill shadow-sm">Sign Up / Login</a>
                <a href="/login" class="btn btn-custom-outline btn-lg px-5 rounded-pill">Admin Access</a>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
