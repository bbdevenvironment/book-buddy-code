<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - BOOK BUDDY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Base Styles & Color Palette */
        :root {
            --brand-navy: #0A2472;
            --brand-crimson: #740f28;
            --brand-white: #ffffff;
            --bg-light: #f4f7f6;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Card Styling */
        .login-card {
            background-color: var(--brand-white);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 5px solid var(--brand-navy);
        }

        /* Brand Header */
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-header img {
            height: 50px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .brand-header h3 {
            color: var(--brand-navy);
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
            font-weight: 500;
        }

        /* Form Inputs */
        .form-control {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--brand-navy);
            box-shadow: 0 0 0 3px rgba(10, 36, 114, 0.1);
            outline: none;
        }

        /* Custom Button */
        .btn-custom-crimson {
            background-color: var(--brand-crimson);
            color: var(--brand-white);
            border: none;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-custom-crimson:hover {
            background-color: #5a0b1f; /* Slightly darker crimson for hover */
            color: var(--brand-white);
            transform: translateY(-1px);
        }

        /* Links */
        .login-links {
            margin-top: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .login-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .login-links a:hover {
            color: var(--brand-crimson);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-header">
            <a href="/">
                <img src="https://www.book-buddy.in/static/img/logo/logo_1.png" alt="Book Buddy Logo" onerror="this.style.display='none'">
            </a>
            <h3>BOOK BUDDY</h3>
            <p>Student Portal Login</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username / Register No" required>
            </div>
            
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-custom-crimson w-100">Login</button>
            
            <div class="login-links">
                <a href="{{ url_for('request_student') }}">New student? Request Access</a>
                <a href="/" style="font-size: 0.85rem;">← Return to Homepage</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
